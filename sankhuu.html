<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Миний Санхүү</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0c29; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input { -webkit-appearance: none; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 99px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const CATEGORIES = {
  income: [
    { id: "salary", label: "Цалин", emoji: "💼" },
    { id: "freelance", label: "Freelance", emoji: "💻" },
    { id: "other_in", label: "Бусад", emoji: "➕" },
  ],
  expense: [
    { id: "food", label: "Хоол", emoji: "🍜" },
    { id: "transport", label: "Тээвэр", emoji: "🚌" },
    { id: "rent", label: "Түрээс", emoji: "🏠" },
    { id: "entertainment", label: "Цэнгэл", emoji: "🎉" },
    { id: "health", label: "Эрүүл мэнд", emoji: "💊" },
    { id: "shopping", label: "Дэлгүүр", emoji: "🛍️" },
    { id: "other_ex", label: "Бусад", emoji: "📦" },
  ],
};

const SAVING_GOAL = 12000000;
const MONTHLY_TARGET = 5000000;
const TABS = ["Нүүр", "Бүртгэл", "Хадгаламж", "Дүн шинжилгээ"];
const TAB_ICONS = ["🏠", "✏️", "💰", "📊"];

function formatMNT(amount) {
  return amount.toLocaleString() + "₮";
}

function App() {
  const [tab, setTab] = useState(0);
  const [transactions, setTransactions] = useState([]);
  const [savings, setSavings] = useState(0);
  const [form, setForm] = useState({ type: "expense", category: "food", amount: "", note: "", date: new Date().toISOString().split("T")[0] });
  const [savingInput, setSavingInput] = useState("");
  const [added, setAdded] = useState(false);

  const totalIncome = transactions.filter(t => t.type === "income").reduce((s, t) => s + t.amount, 0);
  const totalExpense = transactions.filter(t => t.type === "expense").reduce((s, t) => s + t.amount, 0);
  const balance = totalIncome - totalExpense;
  const savingPercent = Math.min((savings / SAVING_GOAL) * 100, 100);
  const budgetUsed = (totalExpense / (MONTHLY_TARGET * 0.5)) * 100;

  const expenseByCategory = CATEGORIES.expense.map(c => ({
    ...c,
    total: transactions.filter(t => t.type === "expense" && t.category === c.id).reduce((s, t) => s + t.amount, 0),
  })).filter(c => c.total > 0).sort((a, b) => b.total - a.total);

  function addTransaction() {
    if (!form.amount || isNaN(form.amount)) return;
    setTransactions(prev => [{ ...form, id: Date.now(), amount: parseInt(form.amount) }, ...prev]);
    setForm({ type: "expense", category: "food", amount: "", note: "", date: new Date().toISOString().split("T")[0] });
    setAdded(true);
    setTimeout(() => setAdded(false), 1800);
  }

  function addSaving() {
    const amt = parseInt(savingInput);
    if (!amt || isNaN(amt)) return;
    setSavings(prev => prev + amt);
    setSavingInput("");
  }

  function getCatLabel(type, id) {
    const found = (CATEGORIES[type] || []).find(c => c.id === id);
    return found ? `${found.emoji} ${found.label}` : id;
  }

  const s = {
    wrap: { minHeight: "100vh", background: "linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%)", color: "#fff", display: "flex", flexDirection: "column", maxWidth: 480, margin: "0 auto", position: "relative" },
    header: { padding: "28px 24px 8px" },
    card: { background: "rgba(255,255,255,0.07)", borderRadius: 18, padding: 18, marginBottom: 16 },
    incCard: { flex: 1, background: "rgba(126,232,162,0.12)", border: "1px solid rgba(126,232,162,0.25)", borderRadius: 16, padding: "14px 16px" },
    expCard: { flex: 1, background: "rgba(255,107,107,0.12)", border: "1px solid rgba(255,107,107,0.25)", borderRadius: 16, padding: "14px 16px" },
    bar: (pct, color) => ({ height: "100%", borderRadius: 99, width: `${Math.min(pct,100)}%`, background: color, transition: "width 0.6s" }),
    barWrap: { background: "rgba(255,255,255,0.1)", borderRadius: 99, height: 10, overflow: "hidden" },
    txRow: { display: "flex", alignItems: "center", justifyContent: "space-between", background: "rgba(255,255,255,0.05)", borderRadius: 14, padding: "12px 14px", marginBottom: 8 },
    input: { width: "100%", background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 12, padding: "12px 14px", color: "#fff", fontSize: 15, outline: "none", boxSizing: "border-box" },
    btn: (active, color) => ({ width: "100%", border: "none", borderRadius: 14, padding: "14px 0", cursor: "pointer", background: active ? "linear-gradient(90deg,#7ee8a2,#00b09b)" : (color || "linear-gradient(90deg,#7c3aed,#a855f7)"), color: active ? "#111" : "#fff", fontWeight: 800, fontSize: 15, transition: "all 0.3s" }),
    navBtn: (active) => ({ flex: 1, border: "none", background: "transparent", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, color: active ? "#a855f7" : "#555" }),
    nav: { position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: "rgba(15,12,41,0.97)", backdropFilter: "blur(20px)", borderTop: "1px solid rgba(255,255,255,0.1)", display: "flex", padding: "10px 0 18px" },
    content: { flex: 1, overflowY: "auto", padding: "8px 24px 100px" },
    label: { fontSize: 11, color: "#a89fd8", marginBottom: 6 },
    sectionTitle: { fontSize: 13, fontWeight: 700, color: "#a89fd8", marginBottom: 10 },
  };

  return (
    <div style={s.wrap}>
      {/* Header */}
      <div style={s.header}>
        <div style={{ fontSize: 12, color: "#a89fd8", letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 }}>Миний санхүү</div>
        <div style={{ fontSize: 30, fontWeight: 800, letterSpacing: -1 }}>{formatMNT(balance)}</div>
        <div style={{ fontSize: 13, color: balance >= 0 ? "#7ee8a2" : "#ff6b6b", marginTop: 2 }}>
          {balance >= 0 ? "✅ Тэнцвэртэй" : "⚠️ Зарлага илүүдсэн"}
        </div>
        <div style={{ display: "flex", gap: 12, marginTop: 18 }}>
          <div style={s.incCard}>
            <div style={{ fontSize: 11, color: "#7ee8a2", marginBottom: 4 }}>📈 Орлого</div>
            <div style={{ fontWeight: 700, fontSize: 17 }}>{formatMNT(totalIncome)}</div>
          </div>
          <div style={s.expCard}>
            <div style={{ fontSize: 11, color: "#ff9a9a", marginBottom: 4 }}>📉 Зарлага</div>
            <div style={{ fontWeight: 700, fontSize: 17 }}>{formatMNT(totalExpense)}</div>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={s.content}>

        {/* HOME */}
        {tab === 0 && <div>
          <div style={s.card}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
              <span style={{ fontSize: 13, fontWeight: 600 }}>🎯 Сарын төсөв</span>
              <span style={{ fontSize: 12, color: "#a89fd8" }}>{Math.round(budgetUsed)}% ашигласан</span>
            </div>
            <div style={s.barWrap}>
              <div style={s.bar(budgetUsed, budgetUsed > 90 ? "linear-gradient(90deg,#ff6b6b,#ee0979)" : budgetUsed > 60 ? "linear-gradient(90deg,#f7971e,#ffd200)" : "linear-gradient(90deg,#7ee8a2,#00b09b)")} />
            </div>
            <div style={{ fontSize: 11, color: "#a89fd8", marginTop: 6 }}>Зорилт: {formatMNT(MONTHLY_TARGET * 0.5)} | Ашигласан: {formatMNT(totalExpense)}</div>
          </div>

          <div style={{ background: "linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,165,0,0.08))", border: "1px solid rgba(255,215,0,0.2)", borderRadius: 18, padding: 18, marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <span style={{ fontWeight: 700 }}>💰 Хадгаламж</span>
              <span style={{ fontSize: 16, fontWeight: 800, color: "#ffd700" }}>{formatMNT(savings)}</span>
            </div>
            <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 99, height: 8, overflow: "hidden", marginBottom: 6 }}>
              <div style={s.bar(savingPercent, "linear-gradient(90deg,#ffd700,#ff8c00)")} />
            </div>
            <div style={{ fontSize: 11, color: "#ffd700aa" }}>Жилийн зорилт: {formatMNT(SAVING_GOAL)} ({Math.round(savingPercent)}%)</div>
          </div>

          <div style={s.sectionTitle}>Сүүлийн гүйлгээ</div>
          {transactions.slice(0, 5).map(t => (
            <div key={t.id} style={s.txRow}>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{getCatLabel(t.type, t.category)}</div>
                <div style={{ fontSize: 11, color: "#a89fd8" }}>{t.note} · {t.date}</div>
              </div>
              <div style={{ fontWeight: 700, color: t.type === "income" ? "#7ee8a2" : "#ff9a9a", fontSize: 15 }}>
                {t.type === "income" ? "+" : "-"}{formatMNT(t.amount)}
              </div>
            </div>
          ))}
        </div>}

        {/* ADD */}
        {tab === 1 && <div>
          <div style={s.card}>
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 16 }}>✏️ Шинэ гүйлгээ нэмэх</div>
            <div style={{ display: "flex", background: "rgba(0,0,0,0.3)", borderRadius: 12, padding: 4, marginBottom: 16 }}>
              {["expense","income"].map(type => (
                <button key={type} onClick={() => setForm(f => ({ ...f, type, category: type === "expense" ? "food" : "salary" }))}
                  style={{ flex: 1, border: "none", borderRadius: 9, padding: "9px 0", cursor: "pointer", fontSize: 13, fontWeight: 600, transition: "all 0.2s", background: form.type === type ? (type === "income" ? "#7ee8a2" : "#ff6b6b") : "transparent", color: form.type === type ? "#111" : "#888" }}>
                  {type === "income" ? "📈 Орлого" : "📉 Зарлага"}
                </button>
              ))}
            </div>

            <div style={{ marginBottom: 14 }}>
              <div style={s.label}>Ангилал</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {CATEGORIES[form.type].map(c => (
                  <button key={c.id} onClick={() => setForm(f => ({ ...f, category: c.id }))}
                    style={{ border: "none", borderRadius: 10, padding: "7px 12px", cursor: "pointer", fontSize: 12, fontWeight: 600, background: form.category === c.id ? "#7c3aed" : "rgba(255,255,255,0.1)", color: "#fff" }}>
                    {c.emoji} {c.label}
                  </button>
                ))}
              </div>
            </div>

            <div style={{ marginBottom: 14 }}>
              <div style={s.label}>Дүн (₮)</div>
              <input type="number" value={form.amount} onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} placeholder="100000" style={s.input} />
            </div>
            <div style={{ marginBottom: 14 }}>
              <div style={s.label}>Тэмдэглэл</div>
              <input type="text" value={form.note} onChange={e => setForm(f => ({ ...f, note: e.target.value }))} placeholder="Тэмдэглэл..." style={s.input} />
            </div>
            <div style={{ marginBottom: 20 }}>
              <div style={s.label}>Огноо</div>
              <input type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} style={s.input} />
            </div>
            <button onClick={addTransaction} style={s.btn(added)}>{added ? "✅ Нэмэгдлээ!" : "➕ Нэмэх"}</button>
          </div>

          <div style={s.sectionTitle}>Бүх гүйлгээ ({transactions.length})</div>
          {transactions.map(t => (
            <div key={t.id} style={s.txRow}>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{getCatLabel(t.type, t.category)}</div>
                <div style={{ fontSize: 11, color: "#a89fd8" }}>{t.note} · {t.date}</div>
              </div>
              <div style={{ fontWeight: 700, color: t.type === "income" ? "#7ee8a2" : "#ff9a9a", fontSize: 15 }}>
                {t.type === "income" ? "+" : "-"}{formatMNT(t.amount)}
              </div>
            </div>
          ))}
        </div>}

        {/* SAVINGS */}
        {tab === 2 && <div>
          <div style={{ background: "linear-gradient(135deg,rgba(255,215,0,0.2),rgba(255,140,0,0.1))", border: "1px solid rgba(255,215,0,0.3)", borderRadius: 20, padding: 22, marginBottom: 16, textAlign: "center" }}>
            <div style={{ fontSize: 13, color: "#ffd700aa", marginBottom: 6 }}>Нийт хадгаламж</div>
            <div style={{ fontSize: 36, fontWeight: 900, color: "#ffd700" }}>{formatMNT(savings)}</div>
            <div style={{ fontSize: 12, color: "#ffd700aa", marginTop: 4 }}>Жилийн зорилтын {Math.round(savingPercent)}%</div>
            <div style={{ background: "rgba(0,0,0,0.2)", borderRadius: 99, height: 12, overflow: "hidden", marginTop: 14 }}>
              <div style={s.bar(savingPercent, "linear-gradient(90deg,#ffd700,#ff8c00)")} />
            </div>
          </div>

          <div style={s.card}>
            <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 12 }}>💵 Хадгаламж нэмэх</div>
            <div style={{ display: "flex", gap: 10 }}>
              <input type="number" value={savingInput} onChange={e => setSavingInput(e.target.value)} placeholder="Дүн оруулах..." style={{ ...s.input, flex: 1 }} />
              <button onClick={addSaving} style={{ border: "none", borderRadius: 12, padding: "0 20px", cursor: "pointer", background: "linear-gradient(90deg,#ffd700,#ff8c00)", color: "#111", fontWeight: 800, fontSize: 14 }}>Нэмэх</button>
            </div>
          </div>

          <div style={s.card}>
            <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 12, color: "#a89fd8" }}>📌 50/30/20 Зөвлөмж</div>
            {[
              { label: "🏠 Зайлшгүй зардал", pct: 50, color: "#4facfe" },
              { label: "🎉 Хүслийн зардал", pct: 30, color: "#a855f7" },
              { label: "💰 Хадгаламж", pct: 20, color: "#ffd700" },
            ].map(item => (
              <div key={item.label} style={{ marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                  <span>{item.label}</span>
                  <span style={{ color: item.color, fontWeight: 700 }}>{formatMNT(5000000 * item.pct / 100)}</span>
                </div>
                <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 99, height: 6 }}>
                  <div style={{ height: "100%", borderRadius: 99, width: `${item.pct}%`, background: item.color }} />
                </div>
              </div>
            ))}
          </div>
        </div>}

        {/* ANALYTICS */}
        {tab === 3 && <div>
          <div style={s.card}>
            <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 14 }}>📊 Зарлагын задаргаа</div>
            {expenseByCategory.length === 0 && <div style={{ color: "#a89fd8", fontSize: 13 }}>Зарлага байхгүй байна</div>}
            {expenseByCategory.map(c => {
              const pct = totalExpense > 0 ? (c.total / totalExpense) * 100 : 0;
              return (
                <div key={c.id} style={{ marginBottom: 14 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 5 }}>
                    <span>{c.emoji} {c.label}</span>
                    <span style={{ fontWeight: 700 }}>{formatMNT(c.total)} <span style={{ color: "#a89fd8", fontWeight: 400 }}>({Math.round(pct)}%)</span></span>
                  </div>
                  <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 99, height: 8 }}>
                    <div style={{ height: "100%", borderRadius: 99, width: `${pct}%`, background: "linear-gradient(90deg,#a855f7,#7c3aed)" }} />
                  </div>
                </div>
              );
            })}
          </div>

          <div style={s.card}>
            <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 12 }}>📈 Хураангуй</div>
            {[
              { label: "Нийт орлого", value: totalIncome, color: "#7ee8a2" },
              { label: "Нийт зарлага", value: totalExpense, color: "#ff9a9a" },
              { label: "Үлдэгдэл", value: balance, color: balance >= 0 ? "#ffd700" : "#ff6b6b" },
              { label: "Хадгаламж", value: savings, color: "#ffd700" },
            ].map(item => (
              <div key={item.label} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
                <span style={{ fontSize: 13, color: "#a89fd8" }}>{item.label}</span>
                <span style={{ fontWeight: 700, color: item.color }}>{formatMNT(item.value)}</span>
              </div>
            ))}
          </div>
        </div>}
      </div>

      {/* Bottom nav */}
      <div style={s.nav}>
        {TABS.map((t, i) => (
          <button key={t} onClick={() => setTab(i)} style={s.navBtn(tab === i)}>
            <span style={{ fontSize: 20 }}>{TAB_ICONS[i]}</span>
            <span style={{ fontSize: 10, fontWeight: tab === i ? 700 : 400 }}>{t}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
